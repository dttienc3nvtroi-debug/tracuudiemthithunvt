            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            color: #1e3a8a;
            margin-top: 0;
            margin-bottom: 6px;
            font-size: 22px;
            font-weight: 700;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 25px;
            font-size: 13px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 14px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }
        input[type="text"]:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        button {
            padding: 12px 24px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        .result-card {
            margin-top: 20px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            background: #ffffff;
            display: none;
        }
        .result-header {
            border-bottom: 2px solid #2563eb;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .result-header h3 {
            margin: 0;
            color: #1e3a8a;
            font-size: 18px;
            text-transform: uppercase;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
        }
        .info-item {
            font-size: 14px;
            color: #475569;
        }
        .info-item span {
            color: #0f172a;
            font-weight: 600;
        }
        .score-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .score-table th, .score-table td {
            border: 1px solid #e2e8f0;
            padding: 10px 12px;
            text-align: left;
            font-size: 14px;
        }
        .score-table th {
            background-color: #f1f5f9;
            color: #334155;
            font-weight: 600;
        }
        .score-table td strong {
            color: #2563eb;
        }
        .total-score {
            font-size: 18px;
            font-weight: 700;
            color: #dc2626;
            text-align: right;
            margin-top: 20px;
            padding-top: 12px;
            border-top: 1px dashed #e2e8f0;
        }
        .error {
            color: #b91c1c;
            text-align: center;
            font-weight: 600;
            background: #fef2f2;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #fee2e2;
            display: none;
            font-size: 14px;
        }
    </style>
</head>

    function searchScores() {
        const inputVal = document.getElementById('sbdInput').value.trim();
        const resultCard = document.getElementById('resultCard');
        const errorMsg = document.getElementById('errorMsg');
        
        const student = studentData.find(s => s.sbd === inputVal);

        if (student) {
            document.getElementById('resName').innerText = student.name;
            document.getElementById('resSBD').innerText = student.sbd;
            document.getElementById('resClass').innerText = student.class || "---";
            document.getElementById('resDob').innerText = student.dob || "---";
            document.getElementById('resGender').innerText = student.gender || "---";
            document.getElementById('resTotal').innerText = student.total || "0.00";

            const scoreBody = document.getElementById('scoreBody');
            scoreBody.innerHTML = ''; 

            let hasScores = false;
            for (const [subject, score] of Object.entries(student.scores)) {
                if (score && score !== "nan" && score !== "") {
                    const row = `<tr><td>${subject}</td><td><strong>${score}</strong></td></tr>`;
                    scoreBody.innerHTML += row;
                    hasScores = true;
                }
            }

            if (!hasScores) {
                scoreBody.innerHTML = '<tr><td colspan="2" style="text-align:center; color:#94a3b8;">Không có dữ liệu điểm hoặc vắng thi</td></tr>';
            }

            errorMsg.style.display = 'none';
            resultCard.style.display = 'block';
        } else {
            resultCard.style.display = 'none';
            errorMsg.style.display = 'block';
        }
    }

    document.getElementById('sbdInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            searchScores();
        }
    });
</script>

</body>
</html>
